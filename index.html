        if (!title.trim() || saving) return;
        setSaving(true);
        const taskId = task?.id || genId();
        await onSave({
          id: taskId,
          title: title.trim(),
          status, priority, phase, dashboard,
          due: due || null,
          start_date: startDate || null,
          assignees,
        });
        // Save custom field values
        if (connectionStatus === "connected" && Object.keys(fieldValues).length > 0) {
          try {
            const rows = Object.entries(fieldValues).filter(([k,v]) => v !== "").map(([k,v]) => ({
              id: taskId + "_" + k,
              task_id: taskId,
              field_key: k,
              value: v,
            }));
            if (rows.length > 0) {
              await sb.from("task_field_values").upsert(rows, { onConflict: "id" });
            }
          } catch(e) { console.warn("save field values error:", e); }
        }
        setSaving(false);
      };
      // ── Subtask CRUD ──
      const addSubtask = async () => {
        if (!newSubTitle.trim() || !task?.id) return;
        const st = { id: genId(), parent_id: task.id, title: newSubTitle.trim(), status: "To Do", color: newSubColor, position: subtasks.length };
        if (connectionStatus === "connected") {
          const { data, error } = await sb.from("subtasks").insert(st).select().single();
          if (!error && data) setSubtasks(prev => [...prev, data]);
          else toast("Failed to add subtask", "error");
        }
        setNewSubTitle("");
      };
      const updateSubtask = async (id, updates) => {
        if (connectionStatus === "connected") {
          const { error } = await sb.from("subtasks").update(updates).eq("id", id);
          if (!error) setSubtasks(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
        }
      };
      const deleteSubtask = async (id) => {
        if (connectionStatus === "connected") {
          await sb.from("subtasks").delete().eq("id", id);
          setSubtasks(prev => prev.filter(s => s.id !== id));
        }
      };
      // ── File Attachment ──
      const uploadFile = async (file) => {
        if (!file || !task?.id) return;
        if (file.size > 10 * 1024 * 1024) { toast("File too large (max 10MB)", "error"); return; }
        setUploading(true);
        const attId = genId();
        const storagePath = `${task.id}/${attId}-${file.name}`;
        const { error: uploadErr } = await sb.storage.from("task-attachments").upload(storagePath, file);
        if (uploadErr) { toast("Upload failed: " + uploadErr.message, "error"); setUploading(false); return; }
        const att = { id: attId, task_id: task.id, file_name: file.name, file_size: file.size, mime_type: file.type, storage_path: storagePath };
        const { data, error } = await sb.from("attachments").insert(att).select().single();
        if (!error && data) { setAttachments(prev => [...prev, data]); toast("File attached!", "success"); }
        else toast("Failed to save attachment record", "error");
        setUploading(false);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };
      const handleFileUpload = async (e) => { uploadFile(e.target.files?.[0]); };
      const [dragOver, setDragOver] = useState(false);
      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragOver(false);
        const file = e.dataTransfer?.files?.[0];
        if (file) uploadFile(file);
      };
      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setDragOver(true); };
      const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setDragOver(false); };
      const deleteAttachment = async (att) => {
        await sb.storage.from("task-attachments").remove([att.storage_path]);
        await sb.from("attachments").delete().eq("id", att.id);
        setAttachments(prev => prev.filter(a => a.id !== att.id));
      };
      // Use signed URLs for private bucket (expires in 1 hour)
      const [signedUrls, setSignedUrls] = useState({});
      const getSignedUrl = async (path) => {
        if (signedUrls[path]) return signedUrls[path];
        const { data, error } = await sb.storage.from("task-attachments").createSignedUrl(path, 3600);
        if (!error && data?.signedUrl) {
          setSignedUrls(prev => ({ ...prev, [path]: data.signedUrl }));
          return data.signedUrl;
        }
        return "";
      };
      // Generate signed URLs for all attachments when they load
      useEffect(() => {
        if (attachments.length > 0) {
          attachments.forEach(att => getSignedUrl(att.storage_path));
        }
      }, [attachments]);
      const isImage = (mime) => mime && mime.startsWith("image/");
      const doneCount = subtasks.filter(s => s.status === "Done").length;
      return (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, backgroundColor:"rgba(0,0,0,0.5)", overflowY:"auto", WebkitOverflowScrolling:"touch", zIndex:50 }} onClick={onClose} onDragOver={function(e){e.preventDefault();}} onDrop={function(e){e.preventDefault();}}>
          <div style={{ minHeight:"100%", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"24px 16px 40px" }}>
            <div style={{ backgroundColor:"white", borderRadius:"12px", boxShadow:"0 25px 50px -12px rgba(0,0,0,0.25)", width:"100%", maxWidth:"32rem" }} onClick={e => e.stopPropagation()}>
              <div className="flex items-center justify-between px-6 py-4 border-b">
                <h2 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                  <Icon name={isNew ? "plus" : "edit"} size={18} />
                  {isNew ? "Add New Task" : "Edit Task"}
                </h2>
                <button onClick={onClose} className="p-1 hover:bg-gray-100 rounded"><Icon name="x" size={18} /></button>
              </div>
              <div className="px-6 py-4 space-y-4">
              {/* Title */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 mb-1">Task Title</label>
                <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Enter task title..." className="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:border-blue-400 focus:ring-1 focus:ring-blue-100 outline-none" autoFocus />
              </div>
              {/* Status + Priority row */}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-gray-500 mb-1">Status</label>
                  <div className="flex flex-wrap gap-1.5">
                    {getBoardStatuses(dashboard).map(s => { const c = getStatusColor(s.name, dashboard); return (
                      <button key={s.name} onClick={() => setStatus(s.name)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-all ${status===s.name ? `${c.bg} ${c.text} border-current ring-1` : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50"}`}>{s.name}</button>
                    ); })}
                  </div>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-500 mb-1">Priority</label>
                  <div className="flex flex-wrap gap-1.5">
                    {PRIORITIES.map(p => { const c = COLORS.priorities[p]; return (
                      <button key={p} onClick={() => setPriority(p)} className={`px-2 py-1.5 rounded-lg text-xs font-medium border transition-all inline-flex items-center gap-0.5 ${priority===p ? `${c.bg} ${c.text} border-current ring-1` : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50"}`}><Icon name={c.icon} size={11}/> {c.label}</button>
                    ); })}
                  </div>
                </div>
              </div>
              {/* Phase */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 mb-1"><Icon name="flag" size={12} className="mr-1"/>Phase</label>
                <div className="flex flex-wrap gap-1.5">
                  {PHASES.map(p => { const c = PHASE_COLORS[p]; return (
                    <button key={p} onClick={() => setPhase(p)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-all ${phase===p ? `${c.bg} ${c.text} border-current ring-1` : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50"}`}>{p}</button>
                  ); })}
                </div>
              </div>
              {/* Dashboard */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 mb-1">Dashboard</label>
                <div className="flex flex-wrap gap-1.5">
                  {DASH_OPTIONS.map(d => (
                    <button key={d.id} onClick={() => setDashboard(d.id)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-all inline-flex items-center gap-1 ${dashboard===d.id ? `${d.tagBg} ${d.tagText} border-current ring-1` : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50"}`}><Icon name={d.icon} size={12}/> {d.name}</button>
                  ))}
                </div>
              </div>
              {/* Dates */}
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-semibold text-gray-500 mb-1">Start Date</label>
                  <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:border-blue-400 outline-none" />
                  {startDate && <button onClick={() => setStartDate("")} className="mt-1 text-xs text-red-500 hover:text-red-600">Clear</button>}
                </div>
                <div>
                  <label className="block text-xs font-semibold text-gray-500 mb-1">Due Date</label>
                  <input type="date" value={due} onChange={e => setDue(e.target.value)} className="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:border-blue-400 outline-none" />
                  {due && <button onClick={() => setDue("")} className="mt-1 text-xs text-red-500 hover:text-red-600">Clear</button>}
                </div>
              </div>
              {/* Assignees */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 mb-1">Assignees</label>
                <div className="flex flex-wrap gap-2">
                  {TEAM_MEMBERS.map(name => {
                    const selected = assignees.includes(name);
                    return (
                      <button key={name} onClick={() => toggleAssignee(name)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border transition-all ${selected ? "bg-blue-50 text-blue-700 border-blue-300 ring-1 ring-blue-200" : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50"}`}>
                        <Avatar name={name} />
                        {name.split(" ")[0]}
                        {selected && <Icon name="check" size={12} />}
                      </button>
                    );
                  })}
                </div>
              </div>
              {/* ── Custom Fields Section ── */}
              {getFieldsForBoard(dashboard).length > 0 && (
                <div className="border-t border-gray-200 pt-4">
                  <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-1.5"><Icon name="layers" size={14} className="text-indigo-600"/> Custom Fields</label>
                  <div className="grid grid-cols-2 gap-3">
                    {getFieldsForBoard(dashboard).map(f => (
                      <div key={f.key}>
                        <label className="block text-xs font-semibold text-gray-500 mb-1">{f.label}</label>
                        {f.type === "dropdown" ? (
                          <select value={fieldValues[f.key] || ""} onChange={e => setFieldValues(prev => ({...prev, [f.key]: e.target.value}))}
                            className="w-full text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:border-blue-400 outline-none bg-white">
                            <option value="">—</option>
                            {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                          </select>
                        ) : f.type === "person" ? (
                          <select value={fieldValues[f.key] || ""} onChange={e => setFieldValues(prev => ({...prev, [f.key]: e.target.value}))}
                            className="w-full text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:border-blue-400 outline-none bg-white">
                            <option value="">—</option>
                            {TEAM_MEMBERS.map(n => <option key={n} value={n}>{n}</option>)}
                          </select>
                        ) : f.type === "date" ? (
                          <input type="date" value={fieldValues[f.key] || ""} onChange={e => setFieldValues(prev => ({...prev, [f.key]: e.target.value}))}
                            className="w-full text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:border-blue-400 outline-none" />
                        ) : f.type === "number" ? (
                          <div className="relative">
                            {f.prefix && <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">{f.prefix}</span>}
                            <input type="number" value={fieldValues[f.key] || ""} onChange={e => setFieldValues(prev => ({...prev, [f.key]: e.target.value}))}
                              className={"w-full text-sm border border-gray-200 rounded-lg py-1.5 focus:border-blue-400 outline-none " + (f.prefix ? "pl-6 pr-3" : "px-3") + (f.suffix ? " pr-7" : "")}
                              placeholder="—" />
                            {f.suffix && <span className="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">{f.suffix}</span>}
                          </div>
                        ) : (
                          <input type="text" value={fieldValues[f.key] || ""} onChange={e => setFieldValues(prev => ({...prev, [f.key]: e.target.value}))}
                            className="w-full text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:border-blue-400 outline-none"
                            placeholder="—" />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* ── Subtasks Section ── */}
              {!isNew && connectionStatus === "connected" && (
                <div className="border-t-2 border-blue-200 pt-4 bg-blue-50/30 -mx-6 px-6 pb-4">
                  <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-1.5"><Icon name="check-square" size={14} className="text-blue-600"/>Subtasks {subtasks.length > 0 && <span className="text-gray-400 font-normal text-xs">({doneCount}/{subtasks.length} done)</span>}</label>
                  {loadingSub ? <div className="text-xs text-gray-400 animate-pulse">Loading subtasks...</div> : (
                    <div className="space-y-1.5">
                      {subtasks.map(st => (
                        <div key={st.id} className="flex items-center gap-2 group bg-gray-50 rounded-lg px-2.5 py-1.5">
                          <span className="w-3 h-3 rounded-full flex-shrink-0 cursor-pointer" style={{ backgroundColor: st.color }}
                            onClick={() => {
                              const idx = SUBTASK_COLORS.findIndex(c => c.hex === st.color);
                              const next = SUBTASK_COLORS[(idx + 1) % SUBTASK_COLORS.length].hex;
                              updateSubtask(st.id, { color: next });
                            }} title="Click to change color" />
                          <span className={`flex-1 text-sm ${st.status === "Done" ? "line-through text-gray-400" : "text-gray-800"}`}>{st.title}</span>
                          <select value={st.status} onChange={e => updateSubtask(st.id, { status: e.target.value })} className="text-xs bg-transparent border border-gray-200 rounded px-1 py-0.5 cursor-pointer">
                            {["To Do", "In Progress", "Done"].map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                          <button onClick={() => deleteSubtask(st.id)} className="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-opacity"><Icon name="trash" size={13}/></button>
                        </div>
                      ))}
                      {/* Add subtask form */}
                      <div className="flex items-center gap-2 mt-2">
                        <div className="flex gap-1">
                          {SUBTASK_COLORS.map(c => (
                            <button key={c.hex} onClick={() => setNewSubColor(c.hex)}
                              className={`w-4 h-4 rounded-full border-2 transition-all ${newSubColor === c.hex ? "border-gray-600 scale-125" : "border-transparent"}`}
                              style={{ backgroundColor: c.hex }} title={c.name} />
                          ))}
                        </div>
                        <input value={newSubTitle} onChange={e => setNewSubTitle(e.target.value)}
                          onKeyDown={e => e.key === "Enter" && addSubtask()}
                          placeholder="Add a subtask..." className="flex-1 px-2 py-1 text-sm border border-gray-200 rounded-lg outline-none focus:border-blue-400" />
                        <button onClick={addSubtask} disabled={!newSubTitle.trim()} className="px-2 py-1 text-xs bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300"><Icon name="plus" size={12}/></button>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {/* ── Attachments Section ── */}
              {!isNew && connectionStatus === "connected" && (
                <div className={"border-t-2 border-purple-200 pt-4 -mx-6 px-6 pb-4 transition-colors " + (dragOver ? "bg-blue-50/60 border-blue-300" : "bg-purple-50/30")}
                  onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}>
                  <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-1.5"><Icon name="paperclip" size={14} className="text-purple-600"/>Attachments {attachments.length > 0 && <span className="text-gray-400 font-normal text-xs">({attachments.length})</span>}</label>
                  {loadingAtt ? <div className="text-xs text-gray-400 animate-pulse">Loading attachments...</div> : (
                    <div className="space-y-2">
                      {attachments.map(att => {
                        const url = signedUrls[att.storage_path] || "";
                        return (
                        <div key={att.id} className="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2 group">
                          {isImage(att.mime_type) && url ? (
                            <img src={url} alt="" className="w-10 h-10 rounded object-cover flex-shrink-0" />
                          ) : (
                            <div className="w-10 h-10 bg-gray-200 rounded flex items-center justify-center flex-shrink-0"><Icon name="file" size={18} className="text-gray-500"/></div>
                          )}
                          <div className="flex-1 min-w-0">
                            {url ? <a href={url} target="_blank" rel="noopener noreferrer" className="text-sm text-blue-600 hover:text-blue-800 font-medium truncate block">{att.file_name}</a>
                              : <span className="text-sm text-gray-500 truncate block">{att.file_name}</span>}
                            <span className="text-xs text-gray-400">{formatFileSize(att.file_size)}</span>
                          </div>
                          {url && <a href={url} target="_blank" className="text-gray-400 hover:text-gray-600" title="Download"><Icon name="download" size={14}/></a>}
                          <button onClick={() => deleteAttachment(att)} className="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-opacity" title="Delete"><Icon name="trash" size={13}/></button>
                        </div>
                      ); })}
                      {/* Upload button */}
                      <div>
                        <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                        <button onClick={() => fileInputRef.current?.click()} disabled={uploading}
                          className={"flex items-center gap-1.5 px-3 py-2 text-sm border-2 border-dashed rounded-lg transition-all w-full justify-center " + (dragOver ? "border-blue-400 text-blue-600 bg-blue-50" : "border-gray-300 text-gray-500 hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50")}>
                          {uploading ? <><Icon name="loader" size={14} className="animate-spin"/> Uploading...</> : dragOver ? <><Icon name="upload" size={14}/> Drop file here</> : <><Icon name="upload" size={14}/> Attach a file or drag &amp; drop</>}
                        </button>
                        <p className="text-xs text-gray-400 mt-1 text-center">Max 10 MB &middot; Images, PDFs, Word, Excel</p>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {/* Hint for new tasks */}
              {isNew && connectionStatus === "connected" && (
                <p className="text-xs text-gray-400 italic border-t pt-3">Save the task first, then you can add subtasks and attachments.</p>
              )}
            </div>
            {/* Footer */}
            <div style={{ flexShrink:0 }} className="px-6 py-3 border-t bg-gray-50 rounded-b-xl flex items-center justify-between">
              <div>
                {!isNew && !confirmDelete && <button onClick={() => setConfirmDelete(true)} className="text-xs text-red-500 hover:text-red-700 flex items-center gap-1"><Icon name="trash" size={13}/> Delete task</button>}
                {!isNew && confirmDelete && (
                  <div className="flex items-center gap-2">
                    <span className="text-xs text-red-600 font-medium">Are you sure?</span>
                    <button onClick={() => { onDelete(task.id); onClose(); }} className="px-2 py-1 bg-red-600 text-white text-xs rounded hover:bg-red-700">Yes, delete</button>
                    <button onClick={() => setConfirmDelete(false)} className="px-2 py-1 bg-gray-200 text-gray-700 text-xs rounded hover:bg-gray-300">Cancel</button>
                  </div>
                )}
              </div>
              <div className="flex items-center gap-2">
                <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 hover:text-gray-800">Cancel</button>
                <button onClick={handleSave} disabled={!title.trim() || saving} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white text-sm font-semibold rounded-lg flex items-center gap-1.5">
                  {saving ? <Icon name="loader" size={14} className="animate-spin"/> : <Icon name="save" size={14}/>}
                  {isNew ? "Add Task" : "Save Changes"}
                </button>
              </div>
            </div>
          </div>
          </div>
        </div>
      );
    };
    // ─── Kanban Card ───
    const Card = ({ task, onClick, showDashLabel, subtaskCounts, attachmentCounts }) => {
      const pc = COLORS.priorities[task.priority] || COLORS.priorities.none;
      const db = DASHBOARDS.find(d => d.id === task.dashboard) || DASHBOARDS[0];
      const overdue = isOverdue(task.due, task.status);
      const phc = PHASE_COLORS[task.phase] || PHASE_COLORS["Draft"];
      const sc = subtaskCounts?.[task.id];
      const ac = attachmentCounts?.[task.id] || 0;
      return (
        <div onClick={onClick} className="bg-white rounded-lg border border-gray-200 p-3 cursor-pointer hover:shadow-md hover:border-gray-300 transition-all group" style={{ borderLeftWidth:3, borderLeftColor: getStatusColor(task.status, task.dashboard).accent }}>
          <div className="flex items-center justify-between mb-1.5">
            {showDashLabel ? <span className={`inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-xs ${db.tagBg} ${db.tagText}`}><Icon name={db.icon} size={10} /> {db.name}</span> : <span />}
            <span className={`px-1.5 py-0.5 rounded text-xs font-medium ${pc.bg} ${pc.text} inline-flex items-center gap-0.5`}><Icon name={pc.icon} size={11} /> {pc.label}</span>
          </div>
          <h4 className="text-sm font-semibold text-gray-900 leading-snug mb-1.5 group-hover:text-blue-600 line-clamp-2">{task.title}</h4>
          {/* Phase badge */}
          <div className="flex items-center gap-1.5 mb-2 flex-wrap">
            <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium ${phc.bg} ${phc.text}`}>
              <Icon name="flag" size={10} className="mr-0.5"/> {task.phase || "Draft"}
            </span>
            {/* Subtask progress */}
            {sc && sc.total > 0 && (
              <span className="inline-flex items-center gap-1 text-xs text-gray-500">
                <Icon name="check-square" size={11}/>
                <span className="text-gray-600 font-medium">{sc.done}/{sc.total}</span>
              </span>
            )}
            {/* Attachment count */}
            {ac > 0 && (
              <span className="inline-flex items-center gap-0.5 text-xs text-gray-500">
                <Icon name="paperclip" size={11}/> {ac}
              </span>
            )}
          </div>
          {/* Subtask mini progress bar */}
          {sc && sc.total > 0 && (
            <div className="h-1 bg-gray-100 rounded-full overflow-hidden mb-2">
              <div className="h-full bg-green-500 rounded-full transition-all" style={{ width: `${(sc.done / sc.total) * 100}%` }} />
            </div>
          )}
          <div className="flex items-center justify-between">
            <div className="flex items-center -space-x-1.5">
              {task.assignees.slice(0,3).map(a => <Avatar key={a} name={a} />)}
              {task.assignees.length === 0 && <span className="text-xs text-gray-400 italic">Unassigned</span>}
            </div>

                  )))
                );

                  );
                });

    // ─── Scorecard View (L10) ───

      // Load all weeks that have data

          if (data) {

      // Load entries for selected week

          // Fill defaults for metrics not yet saved
          SCORECARD_METRICS.forEach(m => {
            if (!(m.key in ent)) ent[m.key] = "";

        setLoadingScorecard(false);

      useEffect(() => { loadWeeks(); loadIssues(); }, [connectionStatus]);

      const handleSave = async () => {

    };
    // ─── Main App ───
    function App() {

      const [loading, setLoading] = useState(true);

      const [myTasksOpen, setMyTasksOpen] = useState(false);

      const [showBoardSettings, setShowBoardSettings] = useState(false);
      const DEFAULT_GROUP_BY = { "website": "content_type", "campaigns": "duration" };
      const [groupBy, setGroupBy] = useState("status");
      const [boardStatuses, setBoardStatuses] = useState(DEFAULT_BOARD_STATUSES);
      const [boardFields, setBoardFields] = useState(DEFAULT_BOARD_FIELDS);
      // Keep global refs in sync so getBoardStatuses/getFieldsForBoard/getStatusColor work outside App
      useEffect(() => { _boardStatusesState = boardStatuses; }, [boardStatuses]);
      useEffect(() => { _boardFieldsState = boardFields; }, [boardFields]);
      const showToast = (message, type = "info") => setToastMsg({ message, type });
      // Request browser notification permission (must be from user gesture in Safari)
      const requestNotifPermission = function() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
      };
      // Send browser notification
      const sendBrowserNotif = function(title, body) {
        if ("Notification" in window) {
          if (Notification.permission === "default") {
            Notification.requestPermission().then(function(perm) {
              if (perm === "granted") {
                try { new Notification(title, { body: body }); } catch(e) {}
              }
            });
          } else if (Notification.permission === "granted") {
            try { new Notification(title, { body: body }); } catch(e) {}
          }
        }
      };
      // Send email notification via Netlify serverless function
      const sendEmailNotif = async function(toName, taskTitle) {
        var email = TEAM_EMAILS[toName];
        if (!email) return;
        try {
          var res = await fetch("/.netlify/functions/send-email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              to: email,
              toName: toName,
              subject: "Task assigned to you: " + taskTitle,
              taskTitle: taskTitle,
            })
          });
          var data = await res.json();
          if (data.success) console.log("Email sent to " + email);
          else console.warn("Email failed:", data);
        } catch(e) { console.warn("Email send error:", e); }
      };
      // ── Initial load: try Supabase, fallback to localStorage ──
      useEffect(() => {
        (async () => {
          try {
            if (!sb) throw new Error("Supabase client not available");
            const { data, error } = await sb.from("tasks").select("*").order("created_at", { ascending: false });
            if (error) throw error;
            if (data.length === 0) {
              // First run: migrate localStorage or seed data to Supabase
              const localData = loadTasksLocal();
              const source = localData.map(t => ({ ...t, phase: t.phase || "Draft" }));
              const { error: seedErr } = await sb.from("tasks").insert(source);

            setConnectionStatus("connected");

              if (stRes.data) {
                const counts = {};
                stRes.data.forEach(function(s) {
                  if (!counts[s.parent_id]) counts[s.parent_id] = { total: 0, done: 0 };

                  if (s.status === "Done") counts[s.parent_id].done++;
                });

            } catch(stErr) { console.warn("subtask counts error:", stErr); }
            try {
              const attRes = await sb.from("attachments").select("task_id");
              if (attRes.data) {
                const counts = {};
                attRes.data.forEach(function(a) { counts[a.task_id] = (counts[a.task_id] || 0) + 1; });
                setAttachmentCounts(counts);

            } catch(attErr) { console.warn("attachment counts error:", attErr); }
            // Load custom field values for all tasks

              const fvRes = await sb.from("task_field_values").select("task_id, field_key, value");

            // Load board settings (custom statuses & fields)

      // Save to localStorage as backup when offline

      const refreshCounts = async () => {
        if (connectionStatus !== "connected") return;

          });

        if (rawFv) {
          const vals = {};
          rawFv.forEach(r => { if (!vals[r.task_id]) vals[r.task_id] = {}; vals[r.task_id][r.field_key] = r.value || ""; });
          setAllFieldValues(vals);
        }
      };
      const isOverview = activeDash === "overview";
      const dashTasks = useMemo(() => {
        if (isOverview) return tasks;
        return tasks.filter(t => t.dashboard === activeDash);
      }, [tasks, activeDash]);
      const filtered = useMemo(() => {
        let f = dashTasks;

              ? <Board tasks={filtered} onTaskClick={setEditingTask} onStatusChange={changeStatus} onFieldChange={inlineUpdateFieldValue} showDashLabel={isOverview} subtaskCounts={subtaskCounts} attachmentCounts={attachmentCounts} activeDash={activeDash} groupBy={groupBy} allFieldValues={allFieldValues} />
              : <ListView tasks={filtered} onTaskClick={setEditingTask} sortKey={sortKey} sortDir={sortDir} onSort={handleSort} showDashCol={isOverview} subtaskCounts={subtaskCounts} attachmentCounts={attachmentCounts} activeDash={activeDash} allFieldValues={allFieldValues} onInlineUpdate={inlineUpdateTask} onFieldUpdate={inlineUpdateFieldValue} onAddStatus={addStatusToBoard} onUpdateSubtask={inlineUpdateSubtask} onAddFieldOption={addFieldOptionToBoard} onUpdateOptionColor={updateOptionColorOnBoard} listGroupBy={groupBy} />}
            {filtered.length === 0 && <div className="text-center py-16"><Icon name="folder-open" size={40} className="mx-auto text-gray-300 mb-3" /><p className="text-gray-500 font-medium">No tasks match your filters</p><button onClick={() => setShowAddModal(true)} className="mt-3 text-sm text-blue-600 hover:text-blue-700 font-medium flex items-center gap-1 mx-auto"><Icon name="plus" size={14} /> Add a task</button></div>}
          </div>
          )}
          {/* ─── Modals ─── */}
          {editingTask && <TaskFormModal task={editingTask} onSave={saveTask} onClose={handleCloseModal} onDelete={deleteTask} activeDash={activeDash} connectionStatus={connectionStatus} toast={showToast} />}
          {showAddModal && <TaskFormModal task={null} onSave={saveTask} onClose={handleCloseModal} onDelete={deleteTask} activeDash={activeDash} connectionStatus={connectionStatus} toast={showToast} />}
          {showBoardSettings && activeDash !== "overview" && <BoardSettingsModal boardId={activeDash} boardStatuses={boardStatuses} boardFields={boardFields} onSaveStatuses={saveBoardStatuses} onSaveFields={saveBoardFields} onClose={() => setShowBoardSettings(false)} />}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
